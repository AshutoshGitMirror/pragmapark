services:
  - type: web
    name: pragma
    runtime: python
    region: oregon
    # WARNING: free plan (512MB) will OOM with ML+RL+blockchain+DB.
    # Bump to at least starter ($7/mo) for production.
    plan: free
    # Builds the frontend fresh on every deploy so the served bundle can never be
    # a stale committed `frontend/dist` (Render's build image includes node/npm/ts).
    buildCommand: pip install -r requirements.txt && python scripts/download_models.py && cd frontend && npm install && npm run build && cd ..
    healthCheckPath: /api/v1/health
    startCommand: uvicorn src.api.server:app --host 0.0.0.0 --port $PORT --proxy-headers
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pragma-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PRAGMA_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://pragma.onrender.com
      - key: BLOCKCHAIN_PATH
        value: /var/lib/pragma/blockchain.json

databases:
  - name: pragma-db
    databaseName: pragma
    plan: free
    region: oregon
