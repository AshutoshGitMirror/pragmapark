name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.lock
      - run: pip install flake8
      - run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - run: python -c "import py_compile, glob, sys; fs=glob.glob('src/**/*.py', recursive=True); [py_compile.compile(f, doraise=True) for f in fs]; print(f'{len(fs)} files compile OK')"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pragma
          POSTGRES_PASSWORD: pragma
          POSTGRES_DB: pragma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.lock
      - run: pip install pytest pytest-cov httpx
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://pragma:pragma@localhost:5432/pragma_test
          JWT_SECRET: test-secret-not-for-production
          PRAGMA_ENV: testing
      - name: Start ML service
        run: |
          PRAGMA_ENV=testing \
          DATABASE_URL=postgresql://pragma:pragma@localhost:5432/pragma_test \
          JWT_SECRET=test-secret-not-for-production \
          python -m uvicorn src.api.ml_server:app --host 0.0.0.0 --port 8001 &
          for i in $(seq 1 60); do
            body=$(curl -s http://127.0.0.1:8001/api/v1/ready 2>/dev/null)
            echo "attempt $i: $body"
            if echo "$body" | grep -q '"ready": true'; then
              echo "ML server ready"
              break
            fi
            sleep 2
          done
      - run: pytest tests/test_*.py -v --cov=src --cov-report=term-missing --cov-fail-under=20
        env:
          DATABASE_URL: postgresql://pragma:pragma@localhost:5432/pragma_test
          JWT_SECRET: test-secret-not-for-production
          PRAGMA_ENV: testing
          ML_SERVICE_URL: http://127.0.0.1:8001
      - run: alembic check
        env:
          DATABASE_URL: postgresql://pragma:pragma@localhost:5432/pragma_test
          JWT_SECRET: test-secret-not-for-production
          PRAGMA_ENV: testing

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pragma
          POSTGRES_PASSWORD: pragma
          POSTGRES_DB: pragma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.lock
      - run: pip install pytest httpx
      - run: pip install playwright
      - run: playwright install chromium --with-deps
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://pragma:pragma@localhost:5432/pragma_test
          JWT_SECRET: test-secret-not-for-production
          PRAGMA_ENV: testing
      - name: Start ML server
        run: |
          PRAGMA_ENV=testing \
          DATABASE_URL=postgresql://pragma:pragma@localhost:5432/pragma_test \
          JWT_SECRET=test-secret-not-for-production \
          python -m uvicorn src.api.ml_server:app --host 0.0.0.0 --port 8001 &
          for i in $(seq 1 60); do
            body=$(curl -s http://127.0.0.1:8001/api/v1/ready 2>/dev/null)
            echo "attempt $i: $body"
            if echo "$body" | grep -q '"ready": true'; then
              echo "ML server ready"
              break
            fi
            sleep 2
          done
      - name: Start main server
        run: |
          PRAGMA_ENV=testing \
          DATABASE_URL=postgresql://pragma:pragma@localhost:5432/pragma_test \
          JWT_SECRET=test-secret-not-for-production \
          ML_SERVICE_URL=http://127.0.0.1:8001 \
          python -m uvicorn src.api:app --host 0.0.0.0 --port 8989 &
          for i in $(seq 1 60); do
            body=$(curl -s http://127.0.0.1:8989/api/v1/ready 2>/dev/null)
            echo "attempt $i: $body"
            if echo "$body" | grep -q '"ready": true'; then
              echo "Main server ready"
              break
            fi
            sleep 2
          done
      - run: PRAGMA_ENV=testing pytest tests/e2e/ -k "not test_driver_full_flow" -v --tb=short -q
        env:
          DATABASE_URL: postgresql://pragma:pragma@localhost:5432/pragma_test
          JWT_SECRET: test-secret-not-for-production

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r src/ -ll --quiet
