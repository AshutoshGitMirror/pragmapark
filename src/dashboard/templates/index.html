<!DOCTYPE html>
<html><head><title>Smart Parking Pro</title>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.plot.ly/plotly-3.0.0.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
           padding: 1.5rem 2rem; border-bottom: 1px solid #334155; }
  h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #34d399);
       -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.25rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 1.25rem; padding: 1.5rem 2rem; }
  .card { background: #1e293b; border-radius: 12px; padding: 1.25rem;
          border: 1px solid #334155; }
  .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;
             color: #64748b; margin-bottom: 0.75rem; }
  .value { font-size: 2rem; font-weight: 700; }
  .green { color: #34d399; } .yellow { color: #fbbf24; } .red { color: #ef4444; }
  .row { display: flex; justify-content: space-between; padding: 0.4rem 0;
         border-bottom: 1px solid #1e293b; }
  .badge { padding: 0.15rem 0.5rem; border-radius: 6px; font-size: 0.75rem;
           font-weight: 600; }
  section { padding: 1.5rem 2rem; }
  #chart { width: 100%; height: 400px; }
</style></head><body>
<header><h1>Smart Parking Pro</h1><p>6-Layer Hybrid System: IoT · ML · Blockchain · RL · Digital Twin · API</p></header>
<section class="grid" id="stats">
  <div class="card"><h2>Predicted Occupancy</h2>
    <div class="value green" id="occupancy">--</div></div>
  <div class="card"><h2>Available Spots</h2>
    <div class="value yellow" id="available">--</div></div>
  <div class="card"><h2>Dynamic Price</h2>
    <div class="value green" id="price">--</div></div>
  <div class="card"><h2>Blockchain Blocks</h2>
    <div class="value" id="blocks" style="color:#a78bfa">--</div></div>
</section>
<section class="grid">
  <div class="card" style="grid-column:1/-1"><h2>Live Occupancy Trend</h2><div id="chart"></div></div>
</section>
<section class="grid" id="layers"></section>
<script>
const BASE = "/api/v1";
let history = [];

function init() {
  fetch(BASE+"/digital-twin/status").then(r=>r.json()).then(data => {
    const zones = Object.keys(data);
    document.getElementById("layers").innerHTML = zones.map(z => `
      <div class="card"><h2>Zone: ${z}</h2>
        <div class="row"><span>Congestion</span><span class="badge ${data[z]==='high'?'red':data[z]==='moderate'?'yellow':'green'}">${data[z]}</span></div>
      </div>`).join("");
  });
  tick();
  setInterval(tick, 5000);
}

async function tick() {
  try {
    const r = await fetch(BASE+"/lots/lot_central/availability");
    const d = await r.json();
    const occ = (d.occupied / d.total_slots) || 0;
    document.getElementById("occupancy").textContent = (occ*100).toFixed(1)+"%";
    document.getElementById("available").textContent = d.available;
    document.getElementById("price").textContent = "$"+(8+occ*8).toFixed(2);
    history.push({t: new Date(), v: occ});
    if(history.length>50)history.shift();
    Plotly.react("chart",[{x:history.map(p=>p.t),y:history.map(p=>p.v),type:"scatter",mode:"lines+markers",
      line:{color:"#60a5fa",width:2},marker:{color:"#60a5fa",size:4}}],{
      margin:{t:10,r:10,b:30,l:40},paper_bgcolor:"#1e293b",plot_bgcolor:"#1e293b",
      font:{color:"#94a3b8"},yaxis:{range:[0,1],title:"Occupancy"}});
  }catch(e){}
  try {
    const s = await fetch(BASE+"/health");
    const h = await s.json();
    const r2 = await fetch(BASE+"/revenue");
    const rv = await r2.json();
    document.getElementById("blocks").textContent = rv.completed_sessions || 0;
  }catch(e){}
}
init();
</script></body></html>
