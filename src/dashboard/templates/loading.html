<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragma — Smart Parking Platform</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 24px;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid #1e293b;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; }
.status-grid {
  display: flex; flex-direction: column; gap: 8px;
  min-width: 280px;
}
.status-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: #1e293b; border-radius: 8px;
}
.status-label { font-size: 0.875rem; color: #94a3b8; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #475569; transition: background 0.3s;
}
.status-dot.ok { background: #22c55e; box-shadow: 0 0 8px #22c55e55; }
.status-dot.fail { background: #ef4444; }
.error-msg { font-size: 0.75rem; color: #ef4444; text-align: center; }
.continue-btn {
  display: none; margin-top: 8px;
  padding: 12px 32px; background: #3b82f6; color: #fff;
  border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
  text-decoration: none; transition: background 0.2s;
}
.continue-btn:hover { background: #2563eb; }
.continue-btn.visible { display: inline-block; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<h1>Starting Pragma...</h1>
<div class="status-grid">
  <div class="status-row">
    <span class="status-label">Database</span>
    <span class="status-dot" id="db-status"></span>
  </div>
  <div class="status-row">
    <span class="status-label">Models</span>
    <span class="status-dot" id="ml-status"></span>
  </div>
</div>
<div class="error-msg" id="error-msg"></div>
<a class="continue-btn" id="continue-btn" href="/app/dashboard">Continue to Dashboard</a>

<script>
(async function() {
  const dbDot = document.getElementById("db-status");
  const mlDot = document.getElementById("ml-status");
  const spinner = document.getElementById("spinner");
  const btn = document.getElementById("continue-btn");
  const err = document.getElementById("error-msg");
  let attempts = 0;

  while (true) {
    try {
      const r = await fetch("/api/v1/ready");
      const data = await r.json();
      dbDot.className = "status-dot" + (data.database ? " ok" : " fail");
      mlDot.className = "status-dot" + (data.models_loaded ? " ok" : " fail");
      if (data.ready) {
        spinner.style.display = "none";
        btn.classList.add("visible");
        setTimeout(() => { window.location.href = "/app/dashboard"; }, 1000);
        return;
      }
    } catch (e) {
      err.textContent = "Cannot reach server";
    }
    attempts++;
    await new Promise(r => setTimeout(r, 2000));
  }
})();
</script>
</body>
</html>
