<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e17">
  <title>Pragma — Find Parking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/pragma.css">
  <style>
    .driver-screen { display: none; max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; }
    .driver-screen.active { display: block; }
    .header-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
    .header-bar h1 { font-size: 20px; }
    .lot-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
    .lot-card:hover, .lot-card:focus-visible { border-color: var(--accent); outline: none; }
    .lot-card h3 { font-size: 16px; margin-bottom: 4px; }
    .lot-card .address { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .lot-card .stats { display: flex; gap: 16px; font-size: 13px; }
    .lot-card .stat { display: flex; align-items: center; gap: 4px; }
    .occupancy-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .occupancy-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
    .occ-low { background: var(--success); }
    .occ-mid { background: var(--warning); }
    .occ-high { background: var(--danger); }
    .price-tag { font-size: 18px; font-weight: 700; color: var(--accent); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .badge-available { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-full { background: rgba(239,68,68,0.15); color: var(--danger); }
    .session-active-bar { background: var(--bg-card); border: 1px solid var(--accent); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .timer { font-size: 32px; font-weight: 700; font-family: monospace; color: var(--accent); }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .loading i { font-size: 32px; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 14px; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-width: 90%; text-align: center; animation: slideUp 0.3s ease; }
    .toast.error { border-color: var(--danger); }
    .toast.success { border-color: var(--success); }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .receipt { font-size: 13px; }
    .receipt-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0; max-width: 480px; margin: 0 auto; z-index: 100; }
    .nav-btn { background: none; border: none; color: var(--text-secondary); font-size: 12px; cursor: pointer; padding: 4px 16px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn i { font-size: 18px; }
    .layers-badge { display: inline-flex; gap: 3px; flex-wrap: wrap; margin-top: 8px; }
    .layers-badge span { font-size: 9px; padding: 1px 5px; border-radius: 4px; background: rgba(6,182,212,0.1); color: var(--accent); }
    .dt-scenario-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; background: rgba(139,92,246,0.1); color: var(--purple); border: 1px solid var(--purple); cursor: pointer; }
    .dt-scenario-btn:hover { background: rgba(139,92,246,0.2); }
    .history-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .blockchain-tx { font-family: monospace; font-size: 11px; color: var(--text-secondary); word-break: break-all; }
  </style>
</head>
<body>
  <!-- SCREEN: Find Lots -->
  <div id="screen-find" class="driver-screen active" tabindex="-1">
    <div class="header-bar">
      <div><i class="fas fa-parking" style="color:var(--accent)" aria-hidden="true"></i> <strong>Pragma</strong> <span style="font-size:12px;color:var(--text-secondary)">Driver</span></div>
      <button class="btn btn-outline btn-sm" onclick="showScreen('login')" style="font-size:12px;">
        <i class="fas fa-user" aria-hidden="true"></i> Sign In
      </button>
    </div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
      <i class="fas fa-map-pin" aria-hidden="true"></i> Nearest parking with ML-predicted availability &amp; RL-optimized pricing
    </p>
    <div id="lots-container"><div class="loading"><i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i><br>Finding available lots...</div></div>
  </div>

  <!-- SCREEN: Lot Detail + Start Session -->
  <div id="screen-lot" class="driver-screen" tabindex="-1">
    <div class="header-bar">
      <button class="btn btn-outline btn-sm" onclick="showScreen('find')"><i class="fas fa-arrow-left" aria-hidden="true"></i> Back</button>
      <h1 id="lot-detail-name">Loading...</h1>
      <div></div>
    </div>
    <div id="lot-detail-content"></div>
    <button id="start-session-btn" class="btn btn-primary btn-block" onclick="startSession()" style="margin-top:16px;">
      <i class="fas fa-parking" aria-hidden="true"></i> Start Parking Session
    </button>
  </div>

  <!-- SCREEN: Active Session -->
  <div id="screen-active" class="driver-screen" tabindex="-1">
    <div class="header-bar">
      <div><i class="fas fa-parking" style="color:var(--accent)" aria-hidden="true"></i> <strong>Pragma</strong></div>
      <span class="badge badge-available" id="session-status-badge">Active</span>
    </div>
    <div class="session-active-bar">
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;" id="active-lot-name">Current Session</p>
      <div class="timer" id="session-timer">00:00</div>
      <p style="font-size:13px;margin-top:8px;">
        <span id="entry-price-display">$10.00</span>/hr
        <span style="color:var(--text-secondary);margin-left:8px;" id="slot-display">Slot #0</span>
      </p>
      <div class="layers-badge" id="active-layers-badge">
        <span>IoT</span><span>ML</span><span>Blockchain</span><span>RL</span><span>DT</span><span>Actuator</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn btn-outline btn-sm dt-scenario-btn" onclick="runScenario('zone_closure')">
        <i class="fas fa-flask" aria-hidden="true"></i> DT: Zone Closure
      </button>
      <button class="btn btn-outline btn-sm dt-scenario-btn" onclick="runScenario('price_surge')">
        <i class="fas fa-chart-line" aria-hidden="true"></i> DT: Price Surge
      </button>
    </div>
    <button class="btn btn-block" style="background:var(--danger);color:white;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:600;" onclick="endSession()">
      <i class="fas fa-stop-circle" aria-hidden="true"></i> End Session &amp; Pay
    </button>
  </div>

  <!-- SCREEN: Receipt -->
  <div id="screen-receipt" class="driver-screen" tabindex="-1">
    <div class="header-bar">
      <div><i class="fas fa-check-circle" style="color:var(--success);font-size:24px;" aria-hidden="true"></i></div>
      <div></div>
    </div>
    <div style="text-align:center;padding:20px 0;">
      <h2 style="font-size:24px;color:var(--success);">Session Complete!</h2>
      <div class="receipt" id="receipt-details" style="text-align:left;margin-top:16px;"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="showScreen('history')">
      <i class="fas fa-clock" aria-hidden="true"></i> View History
    </button>
    <button class="btn btn-outline btn-block" onclick="showScreen('find')" style="margin-top:8px;">
      <i class="fas fa-search" aria-hidden="true"></i> Find Another Lot
    </button>
  </div>

  <!-- SCREEN: History -->
  <div id="screen-history" class="driver-screen" tabindex="-1">
    <div class="header-bar">
      <h1>My Sessions</h1>
      <button class="btn btn-outline btn-sm" onclick="showScreen('find')"><i class="fas fa-times" aria-hidden="true"></i></button>
    </div>
    <div id="history-container"><div class="loading"><i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i><br>Loading history...</div></div>
  </div>

  <!-- Login Modal -->
  <div id="screen-login" class="driver-screen" tabindex="-1">
    <div class="header-bar">
      <button class="btn btn-outline btn-sm" onclick="showScreen('find')"><i class="fas fa-arrow-left" aria-hidden="true"></i> Back</button>
      <h1>Sign In</h1>
      <div></div>
    </div>
    <div class="login-box" style="margin-top:40px;">
      <div id="driver-login-error" class="hidden" role="alert" style="background:rgba(239,68,68,0.1);color:var(--danger);padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;"></div>
      <form id="driver-login-form" onsubmit="driverLogin(event)" novalidate>
        <div class="form-group">
          <label for="driver-email">Email</label>
          <input type="email" id="driver-email" autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="driver-password">Password</label>
          <input type="password" id="driver-password" autocomplete="current-password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-right-to-bracket" aria-hidden="true"></i> Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Nav Bar (bottom) -->
  <nav class="nav-bar" id="bottom-nav">
    <button class="nav-btn active" data-screen="find" onclick="showScreen('find')">
      <i class="fas fa-search"></i> Find
    </button>
    <button class="nav-btn" data-screen="active" onclick="showScreen('active')">
      <i class="fas fa-car"></i> Session
    </button>
    <button class="nav-btn" data-screen="history" onclick="showScreen('history')">
      <i class="fas fa-clock"></i> History
    </button>
  </nav>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <div style="height:60px"></div>

  <script>
    const API = window.location.origin;
    let driverToken = sessionStorage.getItem("pragma_token") || localStorage.getItem("pragma_token");
    let driverId = sessionStorage.getItem("pragma_driver_id") || "driver_demo";
    let activeSession = null;
    let sessionStartTime = null;
    let timerInterval = null;
    let selectedLot = null;

    function esc(s) {
      if (s == null) return "";
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    function toast(msg, type) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "toast " + (type || "") + " hidden";
      requestAnimationFrame(() => {
        el.classList.remove("hidden");
        setTimeout(() => el.classList.add("hidden"), 3000);
      });
    }

    async function api(path, opts) {
      const headers = { "Content-Type": "application/json" };
      if (driverToken) headers["Authorization"] = "Bearer " + driverToken;
      const res = await fetch(API + path, { ...(opts||{}), headers });
      if (res.status === 401) { driverToken = null; sessionStorage.removeItem("pragma_token"); showScreen("login"); throw new Error("Session expired"); }
      if (!res.ok) {
        const body = await res.json().catch(()=>({}));
        throw new Error(body.detail || "Request failed (" + res.status + ")");
      }
      return res.json();
    }

    function showScreen(id) {
      document.querySelectorAll(".driver-screen").forEach(s => s.classList.remove("active"));
      const el = document.getElementById("screen-" + id);
      el.classList.add("active");
      el.focus({preventScroll: true});
      document.querySelectorAll(".nav-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.screen === id);
        b.setAttribute("aria-current", b.dataset.screen === id ? "page" : null);
      });
      if (id === "find") loadLots();
      if (id === "history") loadHistory();
      if (id !== "active" && timerInterval) stopTimer();
    }

    // ---- LOTS ----
    async function loadLots() {
      const container = document.getElementById("lots-container");
      try {
        const data = await api("/api/v1/driver/lots");
        if (!data.lots || data.lots.length === 0) {
          container.innerHTML = "<p style='text-align:center;color:var(--text-secondary);'>No lots available</p>";
          return;
        }
        container.innerHTML = data.lots.map(l => {
          const pct = (l.predicted_occupancy * 100).toFixed(0);
          const avail = l.available_spots;
          const occClass = l.predicted_occupancy > 0.8 ? "occ-high" : l.predicted_occupancy > 0.5 ? "occ-mid" : "occ-low";
          const statusBadge = avail > 0 ? "<span class='badge badge-available'>" + avail + " spots</span>" : "<span class='badge badge-full'>Full</span>";
          return "<div class='lot-card' tabindex='0' role='button' aria-label='Select lot: " + esc(l.name) + "' onclick='selectLot(\"" + esc(l.lot_id) + "\")' onkeydown='if(event.key===\"Enter\"||event.key===\" \"){event.preventDefault();selectLot(\"" + esc(l.lot_id) + "\")}'>" +
            "<div style='display:flex;justify-content:space-between;align-items:start;'>" +
            "<div><h3>" + esc(l.name) + "</h3>" +
            "<div class='address'><i class='fas fa-map-marker-alt'></i> " + esc(l.address) + "</div></div>" +
            "<div style='text-align:right;'><span class='price-tag'>$" + esc(l.dynamic_price.toFixed(2)) + "</span><br>" +
            "<span style='font-size:11px;color:var(--text-secondary);'>base $" + esc(l.base_price.toFixed(2)) + "</span></div>" +
            "</div>" +
            "<div class='stats'><span class='stat'><i class='fas fa-car'></i> " + esc(pct) + "% predicted</span>" + statusBadge + "</div>" +
            "<div class='occupancy-bar'><div class='occupancy-fill " + occClass + "' style='width:" + esc(pct) + "%'></div></div>" +
            "</div>";
        }).join("");
      } catch(e) {
        container.innerHTML = "<p style='text-align:center;color:var(--danger);'><i class='fas fa-exclamation-triangle'></i> " + esc(e.message) + "</p>";
      }
    }

    // ---- LOT DETAIL ----
    let selectedLotId = null;
    async function selectLot(lotId) {
      selectedLotId = lotId;
      try {
        const data = await api("/api/v1/driver/lots/" + lotId);
        if (data.error) { toast("Lot not found", "error"); return; }
        document.getElementById("lot-detail-name").textContent = data.name;
        const occ = data.recent_occupancy || [];
        const last = occ[0] || {};
        const pct = last.rate ? (last.rate * 100).toFixed(0) : "30";
        const occClass = (last.rate||0) > 0.8 ? "occ-high" : (last.rate||0) > 0.5 ? "occ-mid" : "occ-low";
        selectedLot = data;
        document.getElementById("lot-detail-content").innerHTML =
          "<div class='chart-card' style='margin-top:16px;'>" +
          "<p style='font-size:13px;color:var(--text-secondary);'><i class='fas fa-map-marker-alt'></i> " + esc(data.address) + "</p>" +
          "<div class='stats' style='margin-top:12px;display:flex;gap:20px;'>" +
          "<div><span style='color:var(--text-secondary);font-size:12px;'>Total Spots</span><br><strong>" + esc(data.total_slots) + "</strong></div>" +
          "<div><span style='color:var(--text-secondary);font-size:12px;'>Base Price</span><br><strong>$" + esc(data.base_price.toFixed(2)) + "</strong></div>" +
          "<div><span style='color:var(--text-secondary);font-size:12px;'>Current</span><br><strong class='" + occClass + "'>" + esc(pct) + "%</strong></div>" +
          "</div>" +
          "<div class='occupancy-bar' style='margin-top:12px;'><div class='occupancy-fill " + occClass + "' style='width:" + esc(pct) + "%'></div></div>" +
          (occ.length > 0 ? "<div style='margin-top:12px;font-size:12px;color:var(--text-secondary);'>Last 24 readings</div>" +
          "<div style='display:flex;gap:2px;margin-top:4px;'>" + occ.slice(0,24).map(r => {
            const c = (r.rate||0) > 0.8 ? "occ-high" : (r.rate||0) > 0.5 ? "occ-mid" : "occ-low";
            return "<div style='width:8px;height:24px;background:" + (c==="occ-high"?"var(--danger)":c==="occ-mid"?"var(--warning)":"var(--success)") + ";border-radius:2px;flex-shrink:0;' title='" + esc((r.rate*100).toFixed(0)) + "%'></div>";
          }).join("") + "</div>" : "") +
          "</div>";
        showScreen("lot");
      } catch (e) {
        toast("Error loading lot: " + e.message, "error");
      }
    }

    // ---- START SESSION ----
    async function startSession() {
      if (!selectedLotId) return;
      const btn = document.getElementById("start-session-btn");
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Starting...';
      try {
        const data = await api("/api/v1/sessions/start", {
          method: "POST",
          body: JSON.stringify({ lot_id: selectedLotId, slot: Math.floor(Math.random()*100) }),
        });
        activeSession = data.data;
        sessionStartTime = Date.now();
        showScreen("active");
        document.getElementById("active-lot-name").textContent = "Session at " + (selectedLot ? selectedLot.name : selectedLotId);
        document.getElementById("entry-price-display").textContent = "$" + (data.data.price_at_entry || 10).toFixed(2);
        document.getElementById("slot-display").textContent = "Slot #" + (data.data.slot || 0);
        startTimer();
        toast("Session started! Layers: " + (data.data.layers_activated || []).join(", "), "success");
      } catch(e) {
        toast("Failed: " + e.message, "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-parking"></i> Start Parking Session';
      }
    }

    // ---- END SESSION ----
    async function endSession() {
      if (!activeSession) return;
      if (!confirm("End your parking session?")) return;
      const endBtn = document.querySelector('.btn-block[style*="danger"]');
      if (endBtn) { endBtn.disabled = true; endBtn.textContent = "Processing..."; }
      try {
        const data = await api("/api/v1/sessions/end", {
          method: "POST",
          body: JSON.stringify({ session_id: activeSession.session_id }),
        });
        await api("/api/v1/payments/confirm", {
          method: "POST",
          body: JSON.stringify({ session_id: activeSession.session_id }),
        });
        stopTimer();
        const dur = data.data.duration_hours || 0;
        const hrs = Math.floor(dur);
        const min = Math.round((dur - hrs) * 60);
        document.getElementById("receipt-details").innerHTML =
          "<div class='receipt-row'><span>Duration</span><span>" + esc(hrs) + "h " + esc(min) + "m</span></div>" +
          "<div class='receipt-row'><span>Entry Price</span><span>$" + esc((data.data.entry_price||0).toFixed(2)) + "/hr</span></div>" +
          "<div class='receipt-row'><span>Final Price</span><span>$" + esc((data.data.final_price||0).toFixed(2)) + "/hr</span></div>" +
          "<div class='receipt-row' style='font-weight:700;color:var(--success);border-bottom:none;'><span>Total Charged</span><span>$" + esc((data.data.amount_charged||0).toFixed(2)) + "</span></div>" +
          "<div class='receipt-row' style='font-size:11px;color:var(--text-secondary);border-bottom:none;'><span>Blockchain Ref</span><span class='blockchain-tx'>" + esc(data.data.blockchain_ref||"") + "</span></div>" +
          "<div class='receipt-row' style='font-size:11px;border-bottom:none;'><span>Layers</span><div class='layers-badge'>" + (data.data.layers_activated||[]).map(l => "<span>" + esc(l) + "</span>").join("") + "</div></div>";
        activeSession = null;
        showScreen("receipt");
        toast("Payment confirmed on-chain!", "success");
      } catch(e) {
        toast("End session failed: " + e.message, "error");
      }
    }

    // ---- DIGITAL TWIN SCENARIOS ----
    async function runScenario(type) {
      try {
        const cid = activeSession ? activeSession.lot_id : "zone_0";
        const data = await api("/api/v1/digital-twin/scenario", {
          method: "POST",
          body: JSON.stringify({ scenario_type: type, zone_id: cid }),
        });
        toast("DT Scenario '" + type + "' complete: " + JSON.stringify(data.data || data), "success");
      } catch(e) {
        toast("Scenario failed: " + e.message, "error");
      }
    }

    // ---- TIMER ----
    function startTimer() {
      stopTimer();
      timerInterval = setInterval(() => {
        if (!sessionStartTime) return;
        const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, "0");
        const s = String(elapsed % 60).padStart(2, "0");
        document.getElementById("session-timer").textContent = m + ":" + s;
      }, 1000);
    }
    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
    }

    // ---- HISTORY ----
    async function loadHistory() {
      const container = document.getElementById("history-container");
      try {
        const data = await api("/api/v1/sessions/history");
        if (!data.sessions || data.sessions.length === 0) {
          container.innerHTML = "<p style='text-align:center;color:var(--text-secondary);'>No parking sessions yet</p>";
          return;
        }
        container.innerHTML = data.sessions.map(s => {
          const statusClass = s.status === "paid" ? "badge-available" : s.status === "active" ? "" : "";
          return "<div class='history-item'>" +
            "<div style='display:flex;justify-content:space-between;'>" +
            "<div><strong>" + esc(s.lot_id) + "</strong> <span class='badge " + statusClass + "'>" + esc(s.status) + "</span></div>" +
            "<span style='font-weight:700;color:var(--accent);'>$" + esc((s.amount_charged||0).toFixed(2)) + "</span>" +
            "</div>" +
            "<div style='font-size:12px;color:var(--text-secondary);margin-top:4px;'>" +
            esc(s.start_time ? new Date(s.start_time).toLocaleString() : "") +
            (s.duration_minutes ? " &middot; " + esc(s.duration_minutes) + " min" : "") +
            "</div></div>";
        }).join("");
      } catch(e) {
        container.innerHTML = "<p style='text-align:center;color:var(--danger);'>" + esc(e.message) + "</p>";
      }
    }

    // ---- LOGIN ----
    async function driverLogin(e) {
      if (e) e.preventDefault();
      const email = document.getElementById("driver-email").value;
      const password = document.getElementById("driver-password").value;
      try {
        const data = await api("/api/v1/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        driverToken = data.access_token;
        driverId = (data.user && data.user.id) || email;
        sessionStorage.setItem("pragma_token", driverToken);
        sessionStorage.setItem("pragma_driver_id", driverId);
        toast("Signed in as " + esc(email), "success");
        document.getElementById("driver-login-error").classList.add("hidden");
        showScreen("find");
      } catch(e) {
        const errEl = document.getElementById("driver-login-error");
        errEl.textContent = "Login failed: " + e.message;
        errEl.classList.remove("hidden");
      }
    }

    // ---- INIT ----
    loadLots();
  </script>
</body>
</html>
