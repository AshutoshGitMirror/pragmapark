<!DOCTYPE html>
<html><head><title>Driver Dashboard - Smart Parking</title>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header { padding: 1.5rem 2rem; border-bottom: 1px solid #334155; }
  h1 { font-size: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
          gap: 1rem; padding: 1.5rem 2rem; }
  .card { background: #1e293b; border-radius: 12px; padding: 1.25rem;
          border: 1px solid #334155; }
  .card h2 { color: #60a5fa; margin-bottom: 0.5rem; }
  .price { font-size: 1.5rem; font-weight: 700; color: #34d399; }
  .spots { color: #fbbf24; }
  .btn { background: #3b82f6; color: #fff; border: none; padding: 0.5rem 1rem;
         border-radius: 8px; cursor: pointer; margin-top: 0.5rem; }
  .btn:hover { background: #2563eb; }
  input, select { width: 100%; padding: 0.5rem; margin: 0.25rem 0 0.75rem;
                  background: #0f172a; border: 1px solid #334155; border-radius: 6px;
                  color: #e2e8f0; }
</style></head><body>
<header><h1>Driver Dashboard</h1><p>Find and book parking spots</p></header>
<section class="grid" id="lots"></section>
<script>
const BASE = "/api/v1";

async function loadLots() {
  const r = await fetch(BASE+"/lots");
  const lots = await r.json();
  document.getElementById("lots").innerHTML = lots.map(l => `
    <div class="card">
      <h2>${l.name}</h2>
      <p>${l.address}</p>
      <div class="price">Base: $${l.base_price.toFixed(2)}</div>
      <button class="btn" onclick="startSession('${l.lot_id}')">Park Here</button>
    </div>`).join("");
}

async function startSession(lotId) {
  const driverId = prompt("Driver ID:");
  if(!driverId) return;
  const r = await fetch(BASE+"/sessions/start", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({lot_id: lotId, driver_id: driverId}),
  });
  const d = await r.json();
  alert(`Session ${d.session_id} started\nPrice: $${d.price_at_entry}`);
}

loadLots();
setInterval(loadLots, 30000);
</script></body></html>
